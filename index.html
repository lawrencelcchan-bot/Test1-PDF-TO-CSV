<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to CSV (Browser Only)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>PDF to CSV</h1>
      <p class="subtitle">Upload a PDF, extract table-like rows, preview them, and download a CSV file.</p>

      <section class="controls">
        <label class="file-label" for="pdfInput">Choose PDF</label>
        <input id="pdfInput" type="file" accept="application/pdf" />
        <button id="downloadBtn" disabled>Download CSV</button>
      </section>

      <p id="status" aria-live="polite">No file selected.</p>

      <section class="table-wrap">
        <table id="resultTable" hidden>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
