<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to CSV (Browser Only)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>PDF to CSV</h1>
      <p class="subtitle">Upload a PDF, tune column breaks in preview, and download a CSV that matches preview exactly.</p>

      <section class="controls">
        <label class="file-label" for="pdfInput">Choose PDF</label>
        <input id="pdfInput" type="file" accept="application/pdf" />
        <button id="downloadBtn" disabled>Download CSV</button>
      </section>

      <p id="status" aria-live="polite">No file selected.</p>

      <section id="editorPanel" class="panel" hidden>
        <h2>Preview &amp; Column Editor</h2>
        <p class="help">Drag dividers to adjust columns. Export uses the preview.</p>

        <div class="editor-top">
          <label for="splitMode">Split mode:</label>
          <select id="splitMode">
            <option value="auto">Auto</option>
            <option value="manual">Manual</option>
          </select>
        </div>

        <div id="manualControls" class="manual-controls" hidden>
          <div class="break-actions">
            <button id="addDividerBtn" type="button">Add divider</button>
            <button id="removeDividerBtn" type="button">Remove divider</button>
            <button id="resetBreaksBtn" type="button">Reset breaks</button>
          </div>
          <label for="breakPositionsInput">Break positions (comma-separated)</label>
          <input id="breakPositionsInput" type="text" placeholder="e.g. 12, 28, 54" />
        </div>

        <p id="breakReadout">Breaks: []</p>

        <div id="linePreview" class="line-preview" aria-label="Line preview with draggable break dividers">
          <pre id="previewText"></pre>
          <div id="dividerLayer" class="divider-layer"></div>
        </div>
      </section>

      <section class="table-wrap">
        <table id="resultTable" hidden>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
